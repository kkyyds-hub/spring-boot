server:
  port: 18080

spring:
  application:
    name: study-system-simple
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/study_system_simple?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.studysystem.entity
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt-secret: ${APP_JWT_SECRET:study-system-simple-demo-secret-please-change}
  upload-dir: ${APP_UPLOAD_DIR:${user.dir}/uploads}

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-cn-hangzhou.aliyuncs.com}
    bucket: ${ALIYUN_OSS_BUCKET:awedkd}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
